<html lang="zh-CN">

    <meta charset="UTF-8" />
    <title>Mail Viewer</title>

    />
  </head>
  <body class="bg-bg text-text font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
